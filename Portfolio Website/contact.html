<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - John Brylle M. Mendoza</title>
  <link rel="stylesheet" href="contact.css" />
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <img src="Logo.png" alt="Logo" class="nav-logo-image" />
        <span class="bat">BAT</span><span class="state">STATE</span><span class="u">U</span>
      </div>
      <ul class="nav-menu">
        <li><a href="index.html"><button class="home-btn">HOME</button></a></li>
        <li><a href="about.html"><button class="about-btn">ABOUT</button></a></li>
        <li><a href="projects.html"><button class="projects-btn">PROJECTS</button></a></li>
        <li><a href="contact.html"><button class="contact-btn">CONTACT</button></a></li>
      </ul>
    </div>
  </nav>

  <!-- Contact Section -->
  <main class="contact-section">
    <div class="contact-container">
      <div class="contact-info">
        <h2>Contact Me</h2>
        
        <div class="contact-item">
          <div class="contact-icon"><img src="Contacts logo/twitter.png" alt="Twitter" /></div>
          <div class="contact-detail">
            <a href="https://twitter.com" target="_blank">twitter.com/johnbryllem</a>
          </div>
        </div>

        <div class="contact-item">
          <div class="contact-icon"><img src="Contacts logo/instagram.png" alt="Instagram" /></div>
          <div class="contact-detail">
            <a href="https://instagram.com" target="_blank">instagram.com/johnbryllem.mendoza</a>
          </div>
        </div>

        <div class="contact-item">
          <div class="contact-icon"><img src="Contacts logo/gmail.png" alt="Email" /></div>
          <div class="contact-detail">
            <a href="mailto:johnbryllem.mendoza@email.com">johnbryllem.mendoza@email.com</a>
          </div>
        </div>

        <div class="contact-item">
          <div class="contact-icon"><img src="Contacts logo/communication.png" alt="Phone" /></div>
          <div class="contact-detail">
            <a href="https://facebook.com" target="_blank">facebook.com/johnbryllem.mendoza</a>
          </div>
        </div>

        <div class="contact-item">
          <div class="contact-icon"><img src="Contacts logo/phone.png" alt="WhatsApp" /></div>
          <div class="contact-detail">
            <a href="https://wa.me/1234567890" target="_blank">+63977656789</a>
          </div>
        </div>
      </div>

      <div class="contact-form-section">
        <h2>Send a Message</h2>
        <form class="contact-form">
          <div class="form-group">
            <label  >Name</label>
            <input type="text" placeholder="Your name" required />
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="Your email" required />
          </div>
          <div class="form-group">
            <label>Message</label>
            <textarea placeholder="Your message" required></textarea>
          </div>
          <div class="form-submit">
            <button type="submit" class="send-btn">Send</button>
          </div>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
