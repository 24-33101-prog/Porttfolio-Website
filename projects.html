<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects - John Brylle M. Mendoza</title>
  <link rel="stylesheet" href="projects.css" />
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <img src="Logo.png" alt="Logo" class="nav-logo-image" />
        <span class="bat">BAT</span><span class="state">STATE</span><span class="u">U</span>
      </div>
      <ul class="nav-menu">
        <li><a href="index.html"><button class="home-btn">HOME</button></a></li>
        <li><a href="about.html"><button class="about-btn">ABOUT</button></a></li>
        <li><a href="projects.html"><button class="projects-btn">PROJECTS</button></a></li>
        <li><a href="contact.html"><button class="contact-btn">CONTACT</button></a></li>
      </ul>
    </div>
  </nav>

  <!-- Projects Section -->
  <main class="projects-section">
    <div class="projects-container">
      <div class="carousel-wrapper">
        <button class="carousel-btn prev">&lt;</button>
        <div class="carousel">
          <div class="carousel-track">
            <div class="carousel-slide">
              <img src="OIP (1).jpeg" alt="Project 1" />
            </div>
            <div class="carousel-slide">
              <img src="OIP (1).jpeg" alt="Project 2" />
            </div>
            <div class="carousel-slide">
              <img src="OIP (1).jpeg" alt="Project 3" />
            </div>
            <div class="carousel-slide">
              <img src="OIP (1).jpeg" alt="Project 4" />
            </div>
            <div class="carousel-slide">
              <img src="OIP (1).jpeg" alt="Project 5" />
            </div>
            <div class="carousel-slide">
              <img src="OIP (1).jpeg" alt="Project 6" />
            </div>
          </div>
        </div>
        <button class="carousel-btn next">&gt;</button>
      </div>
      <div class="carousel-dots"></div>
      <p class="projects-description">There are many variations of passages of Lorem Ipsum available, but the majority have suffered alteration in some form, by injected humour, or randomised words which don't look even slightly believable.</p>
    </div>
  </main>

  <script>
    const carouselTrack = document.querySelector('.carousel-track');
    const carousel = document.querySelector('.carousel');
    const carouselDots = document.querySelector('.carousel-dots');
    const prevBtn = document.querySelector('.carousel-btn.prev');
    const nextBtn = document.querySelector('.carousel-btn.next');
    const originalSlides = Array.from(document.querySelectorAll('.carousel-slide'));
    const totalSlides = originalSlides.length;
    const dots = [];
    let currentIndex = 1;
    let isTransitioning = false;
    let autoSlideInterval;

    function cloneSlides() {
      const firstClone = originalSlides[0].cloneNode(true);
      const lastClone = originalSlides[totalSlides - 1].cloneNode(true);
      firstClone.classList.add('clone');
      lastClone.classList.add('clone');
      carouselTrack.appendChild(firstClone);
      carouselTrack.insertBefore(lastClone, carouselTrack.firstChild);
    }

    function getSlides() {
      return Array.from(carouselTrack.querySelectorAll('.carousel-slide'));
    }

    function buildDots() {
      originalSlides.forEach((_, index) => {
        const dot = document.createElement('div');
        dot.className = 'dot';
        if (index === 0) dot.classList.add('active');
        dot.addEventListener('click', () => {
          goToIndex(index + 1);
          resetAutoPlay();
        });
        carouselDots.appendChild(dot);
        dots.push(dot);
      });
    }

    function updateCarousel(animate = true) {
      const slides = getSlides();
      const slideWidth = slides[0].offsetWidth;
      const gap = 15;
      const offset = currentIndex * (slideWidth + gap);

      carouselTrack.style.transition = animate ? 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)' : 'none';
      carouselTrack.style.transform = `translateX(-${offset}px)`;

      slides.forEach((slide, index) => {
        slide.classList.toggle('active', index === currentIndex);
      });

      const activeDotIndex = (currentIndex - 1 + totalSlides) % totalSlides;
      dots.forEach((dot, index) => {
        dot.classList.toggle('active', index === activeDotIndex);
      });
    }

    function goToIndex(index) {
      if (isTransitioning) return;
      currentIndex = index;
      updateCarousel(true);
    }

    function goToNext() {
      if (isTransitioning) return;
      currentIndex += 1;
      updateCarousel(true);
    }

    function goToPrev() {
      if (isTransitioning) return;
      currentIndex -= 1;
      updateCarousel(true);
    }

    function resetToRealSlide() {
      if (currentIndex === 0) {
        currentIndex = totalSlides;
        requestAnimationFrame(() => {
          carouselTrack.style.transition = 'none';
          updateCarousel(false);
        });
      } else if (currentIndex === totalSlides + 1) {
        currentIndex = 1;
        requestAnimationFrame(() => {
          carouselTrack.style.transition = 'none';
          updateCarousel(false);
        });
      }
    }

    function startAutoPlay() {
      stopAutoPlay();
      autoSlideInterval = setInterval(goToNext, 4500);
    }

    function stopAutoPlay() {
      clearInterval(autoSlideInterval);
    }

    function resetAutoPlay() {
      stopAutoPlay();
      startAutoPlay();
    }

    cloneSlides();
    buildDots();
    updateCarousel(false);

    carouselTrack.addEventListener('transitionstart', () => {
      isTransitioning = true;
    });

    carouselTrack.addEventListener('transitionend', () => {
      isTransitioning = false;
      resetToRealSlide();
    });

    prevBtn.addEventListener('click', () => {
      goToPrev();
      resetAutoPlay();
    });

    nextBtn.addEventListener('click', () => {
      goToNext();
      resetAutoPlay();
    });

    carousel.addEventListener('mouseenter', stopAutoPlay);
    carousel.addEventListener('mouseleave', startAutoPlay);

    window.addEventListener('resize', () => updateCarousel(false));
    startAutoPlay();
  </script>
</body>
</html>
