<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects - John Brylle M. Mendoza</title>
  <link rel="stylesheet" href="projects.css" />
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <span class="bat">BAT</span><span class="state">STATE</span><span class="u">U</span>
      </div>
      <ul class="nav-menu">
        <li><a href="index.html" class="home-btn">HOME</a></li>
        <li><a href="about.html">ABOUT</a></li>
        <li><a href="projects.html" class="active">PROJECTS</a></li>
        <li><a href="contact.html">CONTACT</a></li>
      </ul>
  </nav>

  <!-- Projects Section -->
  <main class="projects-section">
    <div class="projects-container">
      <div class="carousel">
        <div class="carousel-nav">
          <button class="carousel-btn">&lt;</button>
          <button class="carousel-btn">&gt;</button>
        </div>
        <div class="carousel-track">
          <div class="carousel-slide">
            <img src="OIP (1).jpeg" alt="Project 1" />
          </div>
          <div class="carousel-slide">
            <img src="OIP (1).jpeg" alt="Project 2" />
          </div>
          <div class="carousel-slide">
            <img src="OIP (1).jpeg" alt="Project 3" />
          </div>
          <div class="carousel-slide">
            <img src="OIP (1).jpeg" alt="Project 4" />
          </div>
        </div>
      </div>
      <div class="carousel-dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <p class="projects-description">There are many variations of passages of Lorem Ipsum available, but the majority have suffered alteration in some form, by injected humour, or randomised words which don't look even slightly believable.</p>
    </div>
  </main>

  <script>
    let currentSlide = 0;
    const slides = document.querySelectorAll('.carousel-slide');
    const dots = document.querySelectorAll('.dot');
    const carouselTrack = document.querySelector('.carousel-track');
    const carousel = document.querySelector('.carousel');
    const buttons = carousel.querySelectorAll('.carousel-btn');

    function updateCarousel() {
      const slideWidth = slides[0].offsetWidth;
      const gap = 20;
      const offset = currentSlide * (slideWidth + gap);
      carouselTrack.style.transform = `translateX(-${offset}px)`;

      dots.forEach((dot, index) => {
        dot.classList.remove('active');
        if (index === currentSlide) {
          dot.classList.add('active');
        }
      });
    }

    buttons[0].addEventListener('click', () => {
      if (currentSlide > 0) {
        currentSlide--;
        updateCarousel();
      }
    });

    buttons[1].addEventListener('click', () => {
      if (currentSlide < slides.length - 1) {
        currentSlide++;
        updateCarousel();
      }
    });

    dots.forEach((dot, index) => {
      dot.addEventListener('click', () => {
        currentSlide = index;
        updateCarousel();
      });
    });
  </script>
</body>
</html>
